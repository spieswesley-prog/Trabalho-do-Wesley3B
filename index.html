<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Objetivos do Ano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Meus objetivos do ano_</h1>

        <div class="card">
            <!-- Tabs dentro do card -->
            <div class="tabs">
                <button class="tab active" data-target="curso">Estudar cursos na Alura</button>
                <button class="tab" data-target="projetos">Criar projetos em JavaScript</button>
                <button class="tab" data-target="portfolio">Criar um portfolio</button>
                <button class="tab" data-target="curriculo">Atualizar meu currículo</button>
            </div>

            <!-- Conteúdo do objetivo -->
            <div class="content">
                <h2 id="goal-title">Estudar 4 cursos na Alura</h2>
                <p class="subtitle">TEMPO PARA COMPLETAR OBJETIVO</p>
                <div class="countdown">
                    <div><span id="days">0</span> dias</div>
                    <div><span id="hours">0</span> horas</div>
                    <div><span id="minutes">0</span> min</div>
                    <div><span id="seconds">0</span> seg</div>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
